workflow:
  name: "Greenfield Fullstack Development"
  description: "Complete workflow for building new full-stack applications from scratch"
  
  sequence:
    - name: "Project Analysis"
      agent: "analyst"
      creates: "project-brief.md"
      description: "Analyze requirements and create project brief"
    
    - name: "Product Requirements"
      agent: "pm"
      creates: "prd.md"
      description: "Define product requirements and user stories"
    
    - name: "System Architecture"
      agent: "architect"
      creates: "architecture.md"
      description: "Design system architecture and technical specifications"
    
    - name: "Development"
      agent: "dev"
      creates: "implementation.md"
      description: "Implement core functionality and features"
    
    - name: "Quality Assurance"
      agent: "qa"
      creates: "test-plan.md"
      description: "Create test plans and perform quality checks"
    
    - name: "User Experience"
      agent: "ux-expert"
      creates: "ux-guidelines.md"
      description: "Define UX patterns and design guidelines"